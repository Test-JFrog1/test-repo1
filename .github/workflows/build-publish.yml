name: test-oidc-integration

on:
  push:
    branches:
      - main

permissions: 
  id-token: write # Strictly required for creating the OIDC token
  contents: read  # Required for checking out the repository

jobs:
  test-jfrog-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          # Note: Removed the trailing slash from the URL to prevent potential CLI routing issues
          JF_URL: https://${{ secrets.JF_URL }}
          JF_PROJECT: ${{ secrets.JF_PROJECT }}
        with:
          # Matches the provider name currently in your file
          oidc-provider-name: soumilv-oidc-integration

      - name: Test JFrog Connection
        run: |
          echo "Testing OIDC connection to JFrog..."
          jf rt ping
