name: "Frogbot Scan Pull Request"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  pull-requests: write # Required for Frogbot to post comments on the PR
  contents: read       # Required to checkout the code
  id-token: write      # REQUIRED for OIDC token generation

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    # CRITICAL: This environment must exist in GitHub Settings -> Environments
    # AND it must have "Required reviewers" enabled with at least one person assigned.
    environment: frogbot
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Frogbot
        uses: jfrog/frogbot@v2
        with:
          # This must match the name of the integration you created in JFrog Platform
          oidc-provider-name: soumilv-oidc-integration
        env:
          JFROG_CLI_LOG_LEVEL: DEBUG
          
          # JFrog Platform URL (e.g., https://myinstance.jfrog.io)
          # Ensure the secret JF_URL does not include 'https://' or a trailing slash 
          # if you are concatenating it in the URL field below.
          JF_URL: https://${{ secrets.JF_URL }}/
          
          # The GitHub token automatically generated for the job to post comments
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Optional: JFrog Project Key if you are using JFrog Projects
          JF_PROJECT: ${{ secrets.JF_PROJECT }}
